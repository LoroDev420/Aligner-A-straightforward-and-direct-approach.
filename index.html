<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aligner: A straightforward and direct approach.</title>
    <style>
        :root {
            --bg: #EFE8DF;
            --coral: #DF7366;
            --green: #6EB077;
            --blue: #418BCA;
            --white: #ffffff;
            --bar-w: 40px;
            --gap: 12px;
            --shadow-soft: 0 4px 15px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.02);
            --shadow-lift: 0 15px 30px rgba(0,0,0,0.15), 0 10px 15px rgba(0,0,0,0.1);
        }

        body {
            background: var(--bg);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            cursor: none !important;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
        }
        
        button, .mode-btn, .mute-btn, input[type=range] { cursor: none !important; }

        #custom-cursor {
            position: fixed;
            width: 28px;
            height: 28px;
            z-index: 10001; 
            pointer-events: none;
            transition: none;
        }

        /* ANIMAÇÃO DE TEXTO */
        @keyframes textAppear {
            from { opacity: 0; transform: translateY(10px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .animate-text { animation: textAppear 0.4s cubic-bezier(0.2, 1, 0.3, 1) forwards; }

        /* ANIMAÇÃO DO BOTÃO DE MODO (POP CARTOON) */
        @keyframes buttonPop {
            0% { transform: scale(1); }
            40% { transform: scale(1.15) rotate(2deg); }
            70% { transform: scale(0.95) rotate(-2deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .mode-pop { animation: buttonPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .mode-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 12px 24px; border-radius: 30px;
            border: none; color: white; font-weight: bold;
            box-shadow: var(--shadow-soft); z-index: 1000;
            transition: background 0.4s ease; /* Transição suave de cor */
        }
        body.mode-manual .mode-btn { background: var(--coral); }
        body.mode-auto .mode-btn { background: var(--green); }
        body.mode-challenge .mode-btn { background: var(--blue); }

        .mute-btn {
            position: absolute; top: 20px; left: 20px;
            width: 50px; height: 50px; border-radius: 15px;
            border: 3px solid #333; background: white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow-soft); z-index: 1000;
        }

        .header {
            text-align: center;
            pointer-events: none;
            height: 160px; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        #timer-display {
            font-size: 3rem; font-weight: 900; color: #333;
            margin-bottom: 5px; height: 60px; display: none;
        }
        body.mode-challenge #timer-display { display: block; }
        #timer-display.low-time { color: var(--coral); animation: shake 0.2s infinite; }

        h1 { font-size: 2.8rem; margin: 0; color: #333; letter-spacing: -1px; }
        p { color: #888; margin: 8px 0 0; font-size: 1.1rem; }

        .action-slot {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .reset-btn {
            background: #333; color: white; border: none;
            padding: 10px 25px; border-radius: 20px; font-weight: 600;
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s;
        }
        .reset-btn:active { transform: scale(0.95); }

        body.mode-auto #reset-btn,
        body.mode-challenge #reset-btn { display: none; }

        .challenge-setup {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            border: 3px solid #333;
            box-shadow: var(--shadow-soft);
            width: 240px;
        }
        body.mode-challenge .challenge-setup { display: flex; }

        .stage {
            position: relative;
            height: 320px;
            border-bottom: 2px solid rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        .bar-node {
            position: absolute; bottom: 0px; width: var(--bar-w);
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 45px; transition: left 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .bar {
            width: 100%; background: var(--white); border-radius: 6px;
            box-shadow: var(--shadow-soft); transition: all 0.3s;
        }

        .bar-node.active-bar { z-index: 500; }
        .bar-node.active-bar .bar {
            background: var(--coral); transform: translateY(-20px) scale(1.05);
            box-shadow: var(--shadow-lift);
        }
        
        .bar-node.manual-dragging { transition: none !important; }
        .label { position: absolute; bottom: 15px; font-size: 0.8rem; font-weight: bold; color: #aaa; }
        .bar.success { background: var(--green) !important; }
        .bar.fail { background: #bbb !important; filter: grayscale(1); opacity: 0.6; }

        @keyframes shake {
            0% { transform: translateX(0); } 25% { transform: translateX(5px); }
            50% { transform: translateX(-5px); } 75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }

        .confetti { position: absolute; z-index: 10000; pointer-events: none; }
        @keyframes confetti-fall {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--dr)); opacity: 0; }
        }
    </style>
</head>
<body class="mode-manual">

    <div id="custom-cursor">
        <svg viewBox="0 0 24 24" fill="none" width="28" height="28">
            <path d="M4.5 3V17.5L9.2 13.3L13 21L16.5 19.3L12.8 11.7L18.5 11.5L4.5 3Z" 
                  fill="black" stroke="white" stroke-width="2.2" stroke-linejoin="round"/>
        </svg>
    </div>

    <button class="mute-btn" id="mute-toggle">
        <svg id="sound-on-icon" viewBox="0 0 24 24"><path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.03,19.86 21,16.28 21,12C21,7.72 18.03,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/></svg>
        <svg id="sound-off-icon" viewBox="0 0 24 24" style="display:none;"><path d="M12,4L9.91,6.09L12,8.18V4M14.77,12L16.5,13.73C16.74,13.19 16.89,12.61 16.89,12C16.89,10.23 15.89,8.71 14.39,7.97V10.18L14.77,12M19,12C19,13.41 18.66,14.74 18.04,15.91L19.57,17.44C20.47,15.84 21,14 21,12C21,7.72 18.03,4.14 14,3.23V5.29C16.89,6.15 19,8.83 19,12M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.52C15.58,18.04 14.83,18.45 14,18.7V20.76C15.38,20.45 16.63,19.82 17.69,18.95L19.73,21L21,19.73L12,10.73L4.27,3Z"/></svg>
    </button>

    <button class="mode-btn" id="mode-toggle">Mode: Manual</button>

    <div class="main-wrapper">
        <div class="header">
            <div id="timer-display">00.0s</div>
            <h1 id="main-title">Aligner</h1>
            <p id="sub-title"></p>
        </div>

        <div class="action-slot">
            <button class="reset-btn" id="reset-btn">Generate New Challenge</button>
            <div class="challenge-setup" id="challenge-setup">
                <label style="font-weight: bold; color: #333;">Set Time: <span id="time-val">10</span>s</label>
                <input type="range" id="time-slider" min="1" max="20" value="10" style="width: 100%;">
                <button class="reset-btn" id="start-challenge" style="width: 100%;">Start Challenge!</button>
            </div>
        </div>

        <div class="stage" id="stage"></div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const cursor = document.getElementById('custom-cursor');
        const modeBtn = document.getElementById('mode-toggle');
        const muteBtn = document.getElementById('mute-toggle');
        const resetBtn = document.getElementById('reset-btn');
        const timeSlider = document.getElementById('time-slider');
        const timeValDisplay = document.getElementById('time-val');
        const startChallengeBtn = document.getElementById('start-challenge');
        const timerDisplay = document.getElementById('timer-display');
        const subTitleText = document.getElementById('sub-title');
        const mainTitleText = document.getElementById('main-title');

        let barElements = [];
        let modeIndex = 0; 
        const modes = ['manual', 'auto', 'challenge'];
        let isMuted = false;
        let isAuto = false;
        let isChallengeActive = false;
        let draggingNode = null;
        let startX = 0;
        let timeLeft = 0;
        let timerInterval;

        const numBars = 12;
        const barWidth = 40;
        const gap = 12;
        const totalStageWidth = (barWidth * numBars) + (gap * (numBars - 1));

        const audio = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, dur=0.1) {
            if (isMuted) return;
            if (audio.state === 'suspended') audio.resume();
            const o = audio.createOscillator(), g = audio.createGain();
            o.frequency.value = freq; g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + dur);
            o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + dur);
        }

        function updateText(el, newText) {
            if (el.innerText === newText) return;
            el.classList.remove('animate-text');
            void el.offsetWidth;
            el.innerText = newText;
            el.classList.add('animate-text');
        }

        window.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        muteBtn.onclick = () => {
            isMuted = !isMuted;
            muteBtn.classList.toggle('is-muted', isMuted);
            document.getElementById('sound-on-icon').style.display = isMuted ? 'none' : 'block';
            document.getElementById('sound-off-icon').style.display = isMuted ? 'block' : 'none';
        };

        timeSlider.oninput = () => timeValDisplay.innerText = timeSlider.value;

        // LÓGICA DO BOTÃO DE MODO COM ANIMAÇÃO
        modeBtn.onclick = () => {
            modeIndex = (modeIndex + 1) % 3;
            const currentMode = modes[modeIndex];
            
            // Trigger animation do botão
            modeBtn.classList.remove('mode-pop');
            void modeBtn.offsetWidth;
            modeBtn.classList.add('mode-pop');

            document.body.className = 'mode-' + currentMode;
            isAuto = currentMode === 'auto';
            resetChallengeUI();
            
            modeBtn.innerText = `Mode: ${currentMode.charAt(0).toUpperCase() + currentMode.slice(1)}`;
            
            if(currentMode === 'manual') {
                updateText(mainTitleText, "Aligner");
                updateText(subTitleText, "like actually manual, that's your cursor who make it");
            } else if(currentMode === 'auto') {
                updateText(mainTitleText, "Aligner");
                updateText(subTitleText, "sit back and relax, I'm doing it for you");
            } else {
                updateText(mainTitleText, "Aligner");
                updateText(subTitleText, "Beat the clock to stay in line.");
                updateText(timerDisplay, "00.0s");
            }
            init();
        };

        function resetChallengeUI() {
            clearInterval(timerInterval);
            isChallengeActive = false;
            timerDisplay.classList.remove('low-time');
            timerDisplay.innerText = "00.0s";
        }

        resetBtn.onclick = init;
        startChallengeBtn.onclick = startChallenge;

        function init() {
            resetChallengeUI();
            const currentMode = modes[modeIndex];
            if(currentMode === 'manual' || currentMode === 'challenge') updateText(mainTitleText, "Aligner");
            
            stage.innerHTML = '';
            stage.style.width = totalStageWidth + 'px';
            const data = Array.from({length: numBars}, () => Math.floor(Math.random() * 85) + 10);
            if (data.every((v,i) => i===0 || v >= data[i-1])) data.sort(() => Math.random()-0.5);

            barElements = data.map((val, i) => {
                const node = document.createElement('div');
                node.className = 'bar-node';
                node.style.left = (i * (barWidth + gap)) + 'px';
                node.innerHTML = `<div class="bar" style="height: ${val * 3}px"></div><div class="label">${val}</div>`;
                stage.appendChild(node);
                setupDrag(node);
                return { node, val, index: i };
            });

            if (isAuto) setTimeout(autoSortLoop, 600);
        }

        function startChallenge() {
            init();
            isChallengeActive = true;
            timeLeft = parseInt(timeSlider.value);
            timerDisplay.innerText = timeLeft.toFixed(1) + "s";
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) { timeLeft = 0; endChallenge(false); }
                if (timeLeft <= 5) timerDisplay.classList.add('low-time');
                timerDisplay.innerText = timeLeft.toFixed(1) + "s";
            }, 100);
        }

        function endChallenge(win) {
            clearInterval(timerInterval);
            isChallengeActive = false;
            if (win) { checkWin(); } else {
                playSound(150, 0.5);
                document.querySelectorAll('.bar').forEach(b => b.classList.add('fail'));
                updateText(mainTitleText, "TIME OVER!");
                setTimeout(() => { if(modes[modeIndex] === 'challenge') init(); }, 2000);
            }
        }

        function setupDrag(node) {
            node.onpointerdown = (e) => {
                if (isAuto || (modes[modeIndex] === 'challenge' && !isChallengeActive) || document.querySelector('.success')) return;
                draggingNode = barElements.find(item => item.node === node);
                const rect = stage.getBoundingClientRect();
                startX = e.clientX - node.offsetLeft - rect.left;
                node.setPointerCapture(e.pointerId);
                node.classList.add('active-bar', 'manual-dragging');
                playSound(280);
            };
            node.onpointermove = (e) => {
                if (!draggingNode || draggingNode.node !== node) return;
                const rect = stage.getBoundingClientRect();
                let x = e.clientX - startX - rect.left;
                x = Math.max(0, Math.min(totalStageWidth - barWidth, x));
                node.style.left = x + 'px';
                const targetIndex = Math.max(0, Math.min(numBars - 1, Math.round(x / (barWidth + gap))));
                if (targetIndex !== draggingNode.index) reorder(draggingNode.index, targetIndex);
            };
            node.onpointerup = () => {
                if (!draggingNode) return;
                draggingNode.node.classList.remove('active-bar', 'manual-dragging');
                draggingNode.node.style.left = draggingNode.index * (barWidth + gap) + 'px';
                draggingNode = null;
                playSound(440);
                if (modes[modeIndex] === 'challenge') { if (checkIfSorted()) endChallenge(true); } else checkWin();
            };
        }

        function reorder(from, to) {
            const dir = to > from ? 1 : -1;
            for (let i = from; i !== to; i += dir) {
                const nextI = i + dir;
                const itemMovingBack = barElements.find(it => it.index === nextI);
                const itemMovingForward = barElements.find(it => it.index === i);
                itemMovingBack.index = i; itemMovingForward.index = nextI;
                if (itemMovingBack.node !== (draggingNode ? draggingNode.node : null)) {
                    itemMovingBack.node.style.left = itemMovingBack.index * (barWidth + gap) + 'px';
                }
            }
            playSound(350, 0.05);
        }

        async function autoSortLoop() {
            if (!isAuto) return;
            let currentItems = [...barElements].sort((a,b) => a.index - b.index);
            let unsortedItem = null;
            for(let k=1; k<currentItems.length; k++) if(currentItems[k].val < currentItems[k-1].val) { unsortedItem = currentItems[k]; break; }
            if (!unsortedItem) { checkWin(); return; }
            let targetIdx = 0;
            for(let k=0; k<unsortedItem.index; k++) if(currentItems[k].val > unsortedItem.val) { targetIdx = k; break; }
            await new Promise(r => setTimeout(r, 400));
            if(!isAuto) return;
            unsortedItem.node.classList.add('active-bar'); playSound(280);
            await new Promise(r => setTimeout(r, 400));
            if(!isAuto) return;
            reorder(unsortedItem.index, targetIdx);
            unsortedItem.node.style.left = (targetIdx * (barWidth + gap)) + 'px';
            await new Promise(r => setTimeout(r, 500));
            if(!isAuto) return;
            unsortedItem.node.classList.remove('active-bar'); playSound(440);
            if (isAuto) autoSortLoop();
        }

        function checkIfSorted() {
            const currentValues = [...barElements].sort((a,b) => a.index - b.index).map(it => it.val);
            return currentValues.every((v, i) => i === 0 || v >= currentValues[i - 1]);
        }

        function checkWin() {
            if (checkIfSorted()) {
                clearInterval(timerInterval);
                document.querySelectorAll('.bar').forEach(b => b.classList.add('success'));
                [261, 329, 392, 523].forEach((f, i) => setTimeout(() => playSound(f, 0.4), i * 100));
                spawnConfettiExplosion();
                if (isAuto) setTimeout(init, 4000);
                return true;
            }
            return false;
        }

        function spawnConfettiExplosion() {
            const colors = ['#DF7366', '#6EB077', '#F4B41A', '#418BCA', '#FF69B4', '#FFFFFF'];
            const stageRect = stage.getBoundingClientRect();
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                const size = Math.random() * 8 + 4;
                const isCircle = Math.random() > 0.5;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const startX = stageRect.left + (stageRect.width / 2);
                const startY = stageRect.top + (stageRect.height / 2);
                const dx = (Math.random() - 0.5) * 800;
                const dy = (Math.random() * -600) - 200;
                const dr = Math.random() * 1080;
                confetti.style.width = `${size}px`; confetti.style.height = `${size}px`;
                confetti.style.backgroundColor = color;
                confetti.style.borderRadius = isCircle ? '50%' : '2px';
                confetti.style.left = `${startX}px`; confetti.style.top = `${startY}px`;
                confetti.style.setProperty('--dx', `${dx}px`);
                confetti.style.setProperty('--dy', `${dy}px`);
                confetti.style.setProperty('--dr', `${dr}deg`);
                const duration = Math.random() * 2 + 1.5;
                confetti.style.animation = `confetti-fall ${duration}s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), duration * 1000);
            }
        }

        init();
        updateText(subTitleText, "like actually manual, that's your cursor who make it");
    </script>
</body>
</html>
